<!DOCTYPE html>
<html>

<head>
    <title>Week 3 JavaScript Loops and Arrays</title>
</head>

<body>

    <h1>Week 3 JavaScript Loops and Arrays</h1>

    <script>

        // For loop that counts from 0 to 10 and checks odd or even
        document.write("<h2>Odd and Even Numbers</h2>");

        for (let count = 0; count <= 10; count++) {
            if (count % 2 === 0) {
                document.write("Count " + count + " is even<br>");
            } else {
                document.write("Count " + count + " is odd<br>");
            }
        }

        // Ask user for a number between 5 and 20
        let myNum = prompt("Enter a number between 5 and 20:");

        // Convert user input into a number
        myNum = parseInt(myNum);

        // Do While loop that counts from 1 until it equals myNum
        document.write("<h2>Do While Loop</h2>");

        let loopCounter = 1;

        do {
            document.write("Loop counter is " + loopCounter + "<br>");
            loopCounter++;
        } while (loopCounter <= myNum);

        // Store subjects in an array
        let subjects = ["Accounting", "Algebra", "Programming", "Art", "Data Analytics"];

        // Display array values using forEach()
        document.write("<h2>Subjects Displayed with forEach()</h2>");

        subjects.forEach(function(subject) {
            document.write(subject + "<br>");
        });

        // Display array values separated by commas using one statement
        document.write("<h2>Subjects Separated by Commas</h2>");
        document.write(subjects.join(", "));

    </script>

</body>

</html>
