<!DOCTYPE html>
<html>

<head>
    <title>Week 4 Tip Calculator</title>
</head>

<body>

    <h1>Week 4 Tip Calculator</h1>

    <script>

        // Function to verify that the user entered
        // a valid service quality.
        function validateServiceQuality(serviceQuality) {

            return serviceQuality === "great" ||
                   serviceQuality === "ok" ||
                   serviceQuality === "poor";
        }

        // Function to verify that the service amount
        // is between $5.00 and $500.00.
        function validateServiceAmount(serviceAmount) {

            return serviceAmount >= 5 && serviceAmount <= 500;
        }

        // Function to calculate the tip amount
        // based on the service quality.
        function calculateTip(serviceAmount, serviceQuality) {

            // Great service receives a 20% tip.
            if (serviceQuality === "great") {
                return serviceAmount * 0.20;
            }

            // OK service receives a 15% tip.
            if (serviceQuality === "ok") {
                return serviceAmount * 0.15;
            }

            // Poor service receives a 10% tip.
            return serviceAmount * 0.10;
        }

        // Ask the user to enter the service amount.
        let serviceAmount = parseFloat(
            prompt("Enter the service amount between $5.00 and $500.00:")
        );

        // Ask the user to enter the service quality.
        let serviceQuality = prompt(
            "Enter service quality (great, ok, or poor):"
        ).toLowerCase();

        // Check that a valid service quality was entered.
        if (!validateServiceQuality(serviceQuality)) {

            document.write("<h2>Error</h2>");
            document.write("Invalid service quality entered.");

            throw new Error("Invalid service quality");
        }

        // Check that a valid service amount was entered.
        if (!validateServiceAmount(serviceAmount)) {

            document.write("<h2>Error</h2>");
            document.write("Invalid service amount entered.");

            throw new Error("Invalid service amount");
        }

        // Call the function to calculate the tip.
        let tipAmount = calculateTip(
            serviceAmount,
            serviceQuality
        );

        // Display the results to the webpage.
        document.write("<h2>Tip Recommendation</h2>");

        document.write(
            "Service Amount: $" +
            serviceAmount.toFixed(2) +
            "<br><br>"
        );

        document.write(
            "Service Quality: " +
            serviceQuality +
            "<br><br>"
        );

        document.write(
            "Recommended Tip: $" +
            tipAmount.toFixed(2)
        );

    </script>

</body>

</html>
