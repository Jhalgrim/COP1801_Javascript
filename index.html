<!DOCTYPE html>
<html>

<head>
    <title>Week 6 JavaScript Dog Objects</title>
</head>

<body>

    <h1>Week 6 JavaScript Dog Objects</h1>

    <script>

        // Constructor function used to create dog objects.
        function Dog(name, breed, tvShow, notes, mySound, canTalk) {

            this.name = name;
            this.breed = breed;
            this.tvShow = tvShow;
            this.notes = notes;
            this.mySound = mySound;
            this.canTalk = canTalk;

            // Method that uses a conditional statement
            // to display whether the dog can talk.
            this.myGreeting = function () {

                let talkMessage = "";

                if (this.canTalk === true) {
                    talkMessage = "I can talk!";
                } else {
                    talkMessage = "I cannot talk.";
                }

                return (
                    "Hello, my name is " + this.name + ".<br>" +
                    "I am a " + this.breed + ".<br>" +
                    "I am from " + this.tvShow + ".<br>" +
                    "About me: " + this.notes + "<br>" +
                    "My sound is: " + this.mySound + "<br>" +
                    talkMessage
                );
            };
        }

        // Create two dog objects using the constructor.
        let courage = new Dog(
            "Courage",
            "Beagle",
            "Courage the Cowardly Dog",
            "A nervous dog who constantly protects his owners from strange creatures and dangers.",
            "I may be scared of everything, but I will still protect my family.",
            true
        );

        let scooby = new Dog(
            "Scooby-Doo",
            "Great Dane",
            "Scooby-Doo, Where Are You!",
            "A large dog who helps his friends solve mysteries.",
            "Ruh-roh! I sound nervous, but I always help the gang.",
            true
        );

        // Display each dog object's properties and values using for...in loops.
        document.write("<h2>Available Dog Objects</h2>");

        document.write("<h3>Courage</h3>");
        for (let property in courage) {

            if (typeof courage[property] !== "function") {
                document.write(property + ": " + courage[property] + "<br>");
            }
        }

        document.write("<h3>Scooby-Doo</h3>");
        for (let property in scooby) {

            if (typeof scooby[property] !== "function") {
                document.write(property + ": " + scooby[property] + "<br>");
            }
        }

        // Ask the user to select one dog by typing the dog's name.
        let selectedDog = prompt(
            "Type the name of one dog: Courage or Scooby-Doo"
        );

        // Make the user's input easier to compare.
        selectedDog = selectedDog.toLowerCase();

        // Display the selected dog's greeting or an error message.
        document.write("<h2>Selected Dog</h2>");

        if (selectedDog === "courage") {

            document.write("<p>" + courage.myGreeting() + "</p>");

        } else if (selectedDog === "scooby-doo" || selectedDog === "scooby") {

            document.write("<p>" + scooby.myGreeting() + "</p>");

        } else {

            document.write("<p>Error: The dog you selected does not exist.</p>");
        }

    </script>

</body>

</html>
