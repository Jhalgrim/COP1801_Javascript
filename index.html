<!DOCTYPE html>
<html>

<head>
    <title>Week 5 JavaScript Objects</title>
</head>

<body>

    <h1>Week 5 JavaScript Objects</h1>

    <script>

        // Create a literal object using information
        // about a fictional dog from animated television.
        let myDog = {

            name: "Courage",
            breed: "Beagle",
            tvShow: "Courage the Cowardly Dog",
            notes: "A nervous dog who constantly protects his owners from strange creatures and dangers.",
            mySound: "I may be scared of everything, but I will still protect my family."

        };

        // Display the values stored in the object literal.
        document.write("<h2>Dog Object Literal</h2>");

        document.write(
            "My favorite fictional dog is " + myDog.name + ".<br>" +
            myDog.name + " is a " + myDog.breed + ".<br>" +
            "He is from the television show " + myDog.tvShow + ".<br>" +
            "Description: " + myDog.notes + "<br>" +
            "Sound: " + myDog.mySound + "<br><br>"
        );

        // Constructor function used to create dog objects.
        function Dog(name, breed, tvShow, notes, mySound, canTalk) {

            // Store values passed into the constructor.
            this.name = name;
            this.breed = breed;
            this.tvShow = tvShow;
            this.notes = notes;
            this.mySound = mySound;
            this.canTalk = canTalk;

            // Method that displays information about the dog.
            this.myGreeting = function () {

                document.write("<h2>Dog Constructor Object</h2>");

                document.write(
                    "Hello, my name is " + this.name + ".<br>" +
                    "I am a " + this.breed + ".<br>" +
                    "I am from " + this.tvShow + ".<br>" +
                    "About me: " + this.notes + "<br>" +
                    "My sound is: " + this.mySound + "<br>" +
                    "Can I talk? " + this.canTalk + "."
                );
            };
        }

        // Create a new dog object using the constructor.
        let myDogConst = new Dog(
            "Courage",
            "Beagle",
            "Courage the Cowardly Dog",
            "A nervous dog who constantly protects his owners from strange creatures and dangers.",
            "I may be scared of everything, but I will still protect my family.",
            true
        );

        // Call the object's method.
        myDogConst.myGreeting();

    </script>

</body>

</html>
